spec_version: '1.0'
component: DialogDefault

# Framework-agnostic contract for the DialogDefault recipe. It composes the
# Dialog primitive parts, so the open-state / modality / portal props mirror
# Dialog; `variant`, `hasLoading` and the body slot are the recipe-specific API.
contract:
  properties:
    - name: variant
      type: "'default' | 'rename' | 'save changes' | 'reset password' | 'discard changes' | 'accept' | 'read-only'"
      required: false
      default: "'default'"
      description: >-
        Selects the canned title, body copy and footer buttons. `discard changes`
        uses a destructive primary action; `read-only` shows a single primary
        action (no secondary button).
    - name: hasLoading
      type: boolean
      required: false
      default: false
      description: >-
        Shows a spinner overlay across the body + footer (inset from just below
        the header to the bottom).
    - name: open
      type: boolean
      required: false
      description: Controlled open state. Pair with the change event.
    - name: default-open
      type: boolean
      required: false
      default: false
      description: Initial open state when uncontrolled (React `defaultOpen`).
    - name: modal
      type: "boolean | 'trap-focus'"
      required: false
      default: true
      description: >-
        Modal behavior — traps focus and locks background scroll while open.
        `'trap-focus'` keeps the focus trap but allows background interaction.
    - name: size
      type: "'xs' | 'sm' | 'md' | 'lg' | 'xl' | '2xl'"
      required: false
      default: "'sm'"
      description: >-
        Popup max-width (forwarded to the underlying content). Defaults to `sm`
        (512px), matching the reference design.
    - name: portal
      type: boolean
      required: false
      default: true
      description: >-
        Render the content inside a portal (forwarded to the underlying content).
        Required for correct stacking; disable only when supplying your own
        portal ancestor.

  events:
    - name: open-change
      payload: boolean
      description: >-
        Fired when the dialog opens or closes (React: `onOpenChange`). Payload is
        the new open value.

  content:
    - name: default
      description: >-
        Body slot. When provided, it replaces the variant's canned body copy
        while keeping the header and footer chrome.

  methods: []

adapters:
  react:
    component: DialogDefault
    status: implemented
    import: "import { DialogDefault } from '@acronis-platform/ui-react'"
    example: |
      <DialogDefault variant="discard changes" open onOpenChange={setOpen} />

      {/* Override the body slot */}
      <DialogDefault variant="default" defaultOpen>
        <p>Any custom content.</p>
      </DialogDefault>

  vue:
    component: AvDialogDefault
    status: planned
    import: "import { AvDialogDefault } from '@acronis-platform/ui-vue'"
    example: |
      <AvDialogDefault v-model:open="open" variant="save changes" />

  web-components:
    element: ui-dialog-default
    status: planned
    import: "import '@acronis-platform/ui-wc/dialog-default'"
    example: |
      <ui-dialog-default open variant="reset password"></ui-dialog-default>
