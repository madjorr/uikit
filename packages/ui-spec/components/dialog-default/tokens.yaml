spec_version: '1.0'
component: DialogDefault

# References only. Values live in @acronis-platform/tokens-pd (generated from
# @acronis-platform/design-tokens) and resolve per brand/theme at paint time.
#
# COLORS + TYPOGRAPHY are fully tokenized: DialogDefault reuses the shared
# semantic tokens (via the bridged Tailwind names bg-muted / bg-background /
# text-foreground / text-muted-foreground / border-border, plus the backdrop +
# focus tokens inside DialogContent / DialogCloseButton), and delegates its
# footer buttons / rename field / spinner to the Button, InputText and Spinner
# token tiers (documented in those components' specs).
#
# GEOMETRY IS A KNOWN GAP (tracked technical debt, not an oversight): there is
# no `--ui-dialog-*` / `--ui-footer-*` component token tier in tokens-pd yet, so
# the container/header/body/footer geometry (border-radius 8px, min-width 256px,
# width 512px, header/footer height 64px, 16px paddings + gaps, 12px body gap,
# 72px body min-height, 1px divider widths) is applied as plain Tailwind
# utilities in the ui-react source. Replace those with a Dialog/Footer tier once
# the design team ships one in tokens-pd. This mirrors dialog.tsx.
source: '@acronis-platform/tokens-pd'

tokens:
  - {
      name: --ui-background-backdrop-screen,
      affects: overlay,
      description: Scrim color behind the popup (via DialogContent overlay),
    }
  - {
      name: --ui-background-surface-secondary,
      affects: container,
      description: 'Container surface (bridged bg-muted); also the loading scrim base at 95% alpha',
    }
  - {
      name: --ui-background-surface-primary,
      affects: header,
      description: Header / footer bar surface (bridged as `bg-background`),
    }
  - {
      name: --ui-text-on-surface-primary,
      affects: title,
      description: Title + body text color (bridged as `text-foreground`),
    }
  - {
      name: --ui-text-on-surface-secondary,
      affects: close-button,
      description: Idle close-icon color (bridged as `text-muted-foreground`),
    }
  - {
      name: --ui-border-on-surface-border,
      affects: header,
      description: Header bottom / footer top divider (bridged as `border-border`),
    }
  - {
      name: --ui-focus-primary,
      affects: close-button,
      description: Focus-visible ring on the close button,
    }
