spec_version: '1.0'
component: DialogDefault

# References only. Values live in @acronis-platform/tokens-pd (generated from
# @acronis-platform/design-tokens) and resolve per brand/theme at paint time.
#
# Container geometry/color comes from the shared DialogContent (dialog.tsx),
# themed by the `--ui-dialog-container-*` tokens. Header + footer geometry/color
# below resolve to the `--ui-dialog-header-*` / `--ui-footer-*` tiers — this
# component tier was reconciled against the DialogDefault Figma node
# (6343:58898). Footer buttons / the rename field / the spinner delegate to the
# Button, InputText and Spinner token tiers (documented in those components'
# specs).
source: '@acronis-platform/tokens-pd'

tokens:
  - {
      name: --ui-background-backdrop-screen,
      affects: overlay,
      description: Scrim color behind the popup (via DialogContent overlay),
    }
  - {
      name: --ui-dialog-container-color,
      affects: container,
      description: Popup container surface,
    }
  - {
      name: --ui-dialog-container-border-radius,
      affects: container,
      description: Popup container corner radius,
    }
  - {
      name: --ui-dialog-container-width-min,
      affects: container,
      description: Popup container minimum width,
    }
  - {
      name: --ui-dialog-header-color,
      affects: header,
      description: Header bar surface,
    }
  - {
      name: --ui-dialog-header-border-color,
      affects: header,
      description: Header bottom divider color,
    }
  - {
      name: --ui-dialog-header-gap,
      affects: header,
      description: Gap between the title and the close button,
    }
  - {
      name: --ui-dialog-header-height,
      affects: header,
      description: Header bar height,
    }
  - {
      name: --ui-dialog-header-padding-x,
      affects: header,
      description: Header bar horizontal padding,
    }
  - {
      name: --ui-dialog-header-title-color,
      affects: title,
      description: 'Header title color (bridged via `text-foreground`; identical value in the default brand)',
    }
  - {
      name: --ui-dialog-body-gap,
      affects: body,
      description: Gap between stacked body elements,
    }
  - {
      name: --ui-dialog-body-height-min,
      affects: body,
      description: Body minimum height,
    }
  - {
      name: --ui-footer-default-color,
      affects: footer,
      description: Footer bar surface,
    }
  - {
      name: --ui-footer-default-border-color,
      affects: footer,
      description: Footer top divider color,
    }
  - {
      name: --ui-footer-global-gap,
      affects: footer,
      description: Gap between footer buttons,
    }
  - {
      name: --ui-footer-global-height,
      affects: footer,
      description: Footer bar height,
    }
  - {
      name: --ui-footer-global-padding-x,
      affects: footer,
      description: Footer bar horizontal padding,
    }
  - {
      name: --ui-button-icon-global-icon-color-idle,
      affects: close-button,
      description: 'Close-icon color, constant across idle/hover/active in the default brand',
    }
  - {
      name: --ui-button-icon-global-container-color-hover,
      affects: close-button,
      description: Close-button background on hover,
    }
  - {
      name: --ui-button-icon-global-container-color-active,
      affects: close-button,
      description: Close-button background when pressed,
    }
  - {
      name: --ui-focus-primary,
      affects: close-button,
      description: Focus-visible ring on the close button,
    }
  - {
      name: --ui-background-surface-secondary,
      affects: loading-scrim,
      description: 'Loading overlay base color at 95% alpha (bridged `bg-muted/95`)',
    }
