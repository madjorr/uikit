spec_version: '1.0'
component: Popover

schematic: |
  trigger: <button> (anchors and toggles the popover)

  ─ when open ─────────────────────────────
       ▲ (anchored to the trigger, side/align)
  +-------------------------------------+
  | root: <div role="dialog"> (popup)   |
  |   body: arbitrary content           |
  |   ------------------------------    |
  |   footer: action row (optional)     |
  +-------------------------------------+
     root   -> --ui-popover-container-* (color, border, radius, min/max-width)
     body   -> --ui-popover-body-* (gap, padding-y) — optional PopoverBody wrapper
     footer -> --ui-footer-* (default recipe: color, border-top, height, gap, padding-x)
     enter/exit: fade + zoom + slide-from-side (data-[open]/[closed]/[side])

root:
  element: div
  role: dialog
  description: >-
    The floating popup panel (Base UI `Popover.Popup`), positioned relative to
    the trigger and portaled. A bordered, rounded surface; receives focus when
    opened and is dismissed by outside-press or Esc. Holds arbitrary content —
    typically a `body` and, for the action-recipe pattern, a `footer`.

parts:
  - id: trigger
    description: >-
      The control that toggles the popover (Base UI `Popover.Trigger`).
      Polymorphic via `render` — usually a Button. Anchors the popup.
    element: button
  - id: body
    description: >-
      Optional vertical-rhythm wrapper for the popup's main content
      (`PopoverBody`) — a flex column with a themed gap and vertical padding.
      Consumers may render content directly in `root` instead when this
      rhythm isn't needed.
    element: div
    optional: true
  - id: footer
    description: >-
      Optional default action-row footer (`PopoverFooter`) — the
      `FooterDefault` (variant=default) recipe: a top-bordered bar with
      end-aligned actions (e.g. Cancel / Apply buttons).
    element: div
    optional: true

layout:
  type: flex
  direction: column
  order: [trigger, root]

# Popover owns one piece of internal state — whether it is open. The popup's
# presence/visibility is therefore `internal` (driven by this state), reached via
# the controlled prop or interaction (see transitions).
internal_state:
  - id: open
    type: boolean
    values: [false, true]
    initial: false
    controllable_via: [open]
    controlled_default: default-open
    emits: open-change
    changed_by: >-
      trigger click toggles it; outside-press or Esc closes it (when uncontrolled)
    description: Whether the popup is shown; reflected to the trigger + popup.

transitions:
  - id: open
    state: open
    from: false
    on: trigger click
    to: true
    effect: emits open-change(true)
    when_controlled: >-
      internal value does NOT change; the component emits open-change and the
      consumer must update the `open` prop.
  - id: close
    state: open
    from: true
    on: trigger click / outside press / Esc
    to: false
    effect: emits open-change(false)
    when_controlled: >-
      internal value does NOT change; the component emits open-change and the
      consumer must update the `open` prop.

states:
  - {
      id: open,
      trigger: 'internal open === true (data-[open])',
      kind: internal,
      affects: [root],
    }
  - {
      id: closed,
      trigger: 'internal open === false (data-[closed])',
      kind: internal,
      affects: [root],
    }
