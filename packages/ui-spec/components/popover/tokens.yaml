spec_version: '1.0'
component: Popover

# References only. Values live in @acronis-platform/tokens-pd (generated from
# @acronis-platform/design-tokens) and resolve per brand/theme at paint time.
source: '@acronis-platform/tokens-pd'

tokens:
  - {
      name: --ui-popover-container-color,
      affects: root,
      description: Popup surface color,
    }
  - {
      name: --ui-popover-container-border-color,
      affects: root,
      description: Popup border color,
    }
  - {
      name: --ui-popover-container-border-width,
      affects: root,
      description: Popup border width,
    }
  - {
      name: --ui-popover-container-border-radius,
      affects: root,
      description: Popup corner radius,
    }
  - {
      name: --ui-popover-container-min-width,
      affects: root,
      description: Popup minimum width (320px),
    }
  - {
      name: --ui-popover-container-max-width,
      affects: root,
      description: Popup maximum width (512px),
    }
  - {
      name: --ui-text-on-surface-primary,
      affects: root,
      description: Popup text color (bridged as text-foreground),
    }
  - {
      name: --ui-popover-body-gap,
      affects: body,
      description: Vertical gap between body children (12px),
    }
  - {
      name: --ui-popover-body-padding-y,
      affects: body,
      description: Body vertical padding (16px),
    }
  - {
      name: --ui-footer-default-color,
      affects: footer,
      description: Default footer background color,
    }
  - {
      name: --ui-footer-default-border-color,
      affects: footer,
      description: Default footer top border color,
    }
  - {
      name: --ui-footer-default-border-width,
      affects: footer,
      description: Default footer top border width,
    }
  - {
      name: --ui-footer-global-height,
      affects: footer,
      description: Footer height (64px) — shared across footer recipes,
    }
  - {
      name: --ui-footer-global-gap,
      affects: footer,
      description: Gap between footer actions (16px),
    }
  - {
      name: --ui-footer-global-padding-x,
      affects: footer,
      description: Footer horizontal padding (16px),
    }
