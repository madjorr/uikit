spec_version: '1.0'
component: DataTable

# DataTable takes columns/data (it owns table state). The companion parts
# (DataTableToolbar / DataTablePagination / DataTableColumnHeader /
# DataTableViewOptions) take a TanStack `table` instance — see README.
contract:
  properties:
    - name: columns
      type: 'ColumnDef<TData, TValue>[]'
      required: true
      description: TanStack column definitions (header / cell renderers, accessors).
    - name: data
      type: 'TData[]'
      required: true
      description: The row data.
    - name: getRowCanExpand
      type: '(row: Row<TData>) => boolean'
      required: false
      description: Enables row expansion for rows that return true. Pair with renderExpandedRow.
    - name: renderExpandedRow
      type: '(row: Row<TData>) => ReactNode'
      required: false
      description: Renders the detail content for an expanded row.
    - name: striped
      type: boolean
      required: false
      default: 'false'
      description: Alternating row backgrounds (borrowed from the Vue AvTable).
    - name: bordered
      type: boolean
      required: false
      default: 'false'
      description: Vertical borders between columns (rows already have horizontal borders).
    - name: highlightCurrentRow
      type: boolean
      required: false
      default: 'false'
      description: Highlight the row the user last clicked (the "current" row).
    - name: skeleton
      type: boolean
      required: false
      default: 'false'
      description: Render placeholder skeleton rows instead of data (loading state).
    - name: skeletonRows
      type: number
      required: false
      default: '5'
      description: Number of skeleton rows when skeleton is set.
    - name: enableColumnResizing
      type: boolean
      required: false
      default: 'false'
      description: >-
        Opt in to interactive column resizing — renders a drag handle at the
        trailing edge of each resizable header (TanStack's native
        `columnResizing`, `columnResizeMode: 'onChange'`).
    - name: meta.pin
      type: "'left' | 'right'"
      required: false
      description: >-
        Set on a `ColumnDef.meta` (not a DataTable prop) — pins the column to a
        table edge. DataTable drives TanStack's native column-pinning and renders
        the column as `position: sticky` cells with an opaque row background.
    - name: meta.wrap
      type: boolean
      required: false
      description: >-
        Set on a `ColumnDef.meta` (not a DataTable prop) — allows a column's
        header and cell content to wrap onto multiple lines instead of
        truncating, mirroring the `Table` primitives' `wrap` prop.
    - name: children
      type: ReactNode
      required: false
      description: >-
        On DataTableToolbar — filter fields rendered inside a
        `FilterSearchFilters` popover (wire each to a column via
        `useFilterSearchFilters()` keyed by column id). When provided, the
        toolbar renders the filter popover plus a `FilterSearchAppliedFilters`
        chip row below it.
    - name: filtersLabel
      type: ReactNode
      required: false
      default: "'Filters'"
      description: On DataTableToolbar — label for the filters trigger button.
    - name: getFilterChipLabel
      type: '(key: string, value: unknown) => ReactNode'
      required: false
      description: >-
        On DataTableToolbar — formats an applied-filter chip's label (defaults to
        "<id>: <value>").
  events:
    - name: onColumnSizingChange
      payload: 'ColumnSizingState (TanStack OnChangeFn)'
      description: >-
        Passthrough for the `columnSizing` state so a consumer can persist
        column widths when `enableColumnResizing` is set.
  methods: []

adapters:
  react:
    component: DataTable
    status: implemented
    import: "import { DataTable } from '@acronis-platform/ui-react'"
    example: |
      <DataTable columns={columns} data={rows} />
  vue:
    component: AvDataTable
    status: planned
    import: "import { AvDataTable } from '@acronis-platform/ui-vue'"
    example: |
      <AvDataTable :columns="columns" :data="rows" />
  web-components:
    element: ui-data-table
    status: planned
    import: "import '@acronis-platform/ui-wc/data-table'"
    example: |
      <ui-data-table></ui-data-table>
