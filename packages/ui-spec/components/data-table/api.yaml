spec_version: '1.0'
component: DataTable

# DataTable takes columns/data (it owns table state). The companion parts
# (DataTableToolbar / DataTablePagination / DataTableColumnHeader /
# DataTableViewOptions) take a TanStack `table` instance — see README.
contract:
  properties:
    - name: columns
      type: 'ColumnDef<TData, TValue>[]'
      required: true
      description: TanStack column definitions (header / cell renderers, accessors).
    - name: data
      type: 'TData[]'
      required: true
      description: The row data.
    - name: getRowCanExpand
      type: '(row: Row<TData>) => boolean'
      required: false
      description: Enables row expansion for rows that return true. Pair with renderExpandedRow.
    - name: renderExpandedRow
      type: '(row: Row<TData>) => ReactNode'
      required: false
      description: Renders the detail content for an expanded row.
    - name: striped
      type: boolean
      required: false
      default: 'false'
      description: Alternating row backgrounds (borrowed from the Vue AvTable).
    - name: bordered
      type: boolean
      required: false
      default: 'false'
      description: Vertical borders between columns (rows already have horizontal borders).
    - name: highlightCurrentRow
      type: boolean
      required: false
      default: 'false'
      description: Highlight the row the user last clicked (the "current" row).
    - name: skeleton
      type: boolean
      required: false
      default: 'false'
      description: Render placeholder skeleton rows instead of data (loading state).
    - name: skeletonRows
      type: number
      required: false
      default: '5'
      description: Number of skeleton rows when skeleton is set.
    - name: enableColumnResizing
      type: boolean
      required: false
      default: 'false'
      description: Opt into drag-to-resize column headers.
    - name: initialPageSize
      type: number
      required: false
      default: '10'
      description: Initial rows-per-page, before the user (or a bound DataTablePagination) changes it.
    - name: onStateChange
      type: '() => void'
      required: false
      description: >-
        Invoked after any internal grid state change (sorting, filters,
        visibility, selection, expansion, column sizing, pagination). The
        instance exposed via `ref` mutates in place rather than producing a
        new reference each render, so a sibling reading it through that same
        ref (e.g. a bound DataTableToolbar/DataTablePagination) has no other
        signal to know it should re-render — call a state setter here to
        force one.
  events: []
  methods:
    - name: ref
      description: >-
        The React adapter forwards a ref to the live TanStack `Table<TData>`
        instance (exported as the `TanstackTable` type), so companion parts
        (DataTableToolbar / DataTablePagination / DataTableColumnHeader /
        DataTableViewOptions) can be bound to the exact same grid instead of a
        second, independently-constructed `useReactTable` call.

adapters:
  react:
    component: DataTable
    status: implemented
    import: "import { DataTable, type TanstackTable } from '@acronis-platform/ui-react'"
    example: |
      <DataTable columns={columns} data={rows} />

      // Bind companion parts to the same instance via ref + onStateChange:
      const [table, setTable] = useState<TanstackTable<Row> | null>(null);
      const [, setTick] = useState(0);
      <DataTableToolbar table={table} searchKey="email" />
      <DataTable ref={setTable} columns={columns} data={rows}
                 onStateChange={() => setTick((t) => t + 1)} />
      <DataTablePagination table={table} />
  vue:
    component: AvDataTable
    status: planned
    import: "import { AvDataTable } from '@acronis-platform/ui-vue'"
    example: |
      <AvDataTable :columns="columns" :data="rows" />
  web-components:
    element: ui-data-table
    status: planned
    import: "import '@acronis-platform/ui-wc/data-table'"
    example: |
      <ui-data-table></ui-data-table>
