spec_version: '1.0'
component: DataTable

schematic: |
  toolbar:   [ search input ] [ Reset ✕ ]            [ ⚙ View ▾ ]   (view-options)
  table: <div> rounded border wrapper
    column-header: per-column header — title + single-click sort toggle (↓/↑/⇅), optional resize-handle
    row:           data row (selectable; selected → tinted)
    expanded-row:  optional detail row under an expanded row
    empty-state:   "No results." row when there is no data
  pagination: "N of M selected"   [Rows per page ▾]  Page X of Y   ⏮ ◀ ▶ ⏭

root:
  element: div
  description: >-
    The bordered table wrapper. Renders a TanStack table over the Table
    primitives. Manages sorting / filtering / visibility / selection /
    pagination / expansion state internally (DataTable), or accepts a caller-built
    `table` instance for the companion parts.

parts:
  - id: table
    element: table
    description: The table grid (Table / TableHeader / TableBody / rows / cells).
  - id: column-header
    element: button
    description: >-
      Sortable column header (DataTableColumnHeader) — a single-click toggle: the
      title plus a trailing arrow (down = ascending, up = descending, both in the
      active blue; a muted up/down arrow when unsorted). One click cycles the sort
      direction. Column hiding lives in the toolbar's view-options menu, not here.
      When `enableColumnResizing` is set, the underlying TableHead also renders a
      drag-to-resize handle at its trailing edge.
  - id: row
    element: tr
    description: A data row; selectable, tinted when selected.
  - id: expanded-row
    element: tr
    description: Optional detail row rendered under an expanded row.
  - id: empty-state
    element: tr
    description: A single "No results." row shown when there is no data.
  - id: toolbar
    element: div
    description: >-
      DataTableToolbar — a column search box, a Reset button (when filtered), and
      the view-options menu.
  - id: view-options
    element: div
    description: >-
      DataTableViewOptions — a menu of checkboxes toggling column visibility.
  - id: pagination
    element: div
    description: >-
      DataTablePagination — selection count, rows-per-page select, page indicator,
      and first / prev / next / last controls.

states:
  - id: empty
    trigger: data is empty
    kind: prop
    prop: data
    affects: [empty-state]
  - id: expandable
    trigger: getRowCanExpand is provided
    kind: prop
    prop: getRowCanExpand
    affects: [row, expanded-row]
  - id: striped
    trigger: striped is set
    kind: prop
    prop: striped
    affects: [row]
  - id: bordered
    trigger: bordered is set
    kind: prop
    prop: bordered
    affects: [table]
  - id: current
    trigger: highlightCurrentRow is set and a row is clicked
    kind: prop
    prop: highlightCurrentRow
    affects: [row]
  - id: skeleton
    trigger: skeleton is set
    kind: prop
    prop: skeleton
    affects: [row, cell]
  - id: resizable
    trigger: enableColumnResizing is set
    kind: prop
    prop: enableColumnResizing
    affects: [column-header]

internal_state:
  - id: column-sizing
    type: 'Record<string, number>'
    initial: '{}'
    description: >-
      Per-column widths while `enableColumnResizing` is set (TanStack's
      `columnSizing` state). Not controllable via a prop; observe changes
      through `onStateChange`.
    changed_by: dragging a column header's resize handle
  - id: pagination
    type: '{ pageIndex: number; pageSize: number }'
    initial: '{ pageIndex: 0, pageSize: initialPageSize }'
    controlled_default: initialPageSize
    description: >-
      The current page index/size (TanStack's `pagination` state). Not
      controllable via a prop beyond seeding the initial page size; observe
      changes through `onStateChange` or a `ref`-bound DataTablePagination.
    changed_by: DataTablePagination's page/page-size controls, or ref methods (nextPage, setPageSize, ...)
