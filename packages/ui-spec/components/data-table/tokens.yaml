spec_version: '1.0'
component: DataTable

# References only. Values live in @acronis-platform/tokens-pd. DataTable adds no
# color of its own — it composes already-themed components (Table, Button,
# DropdownMenu, InputSelect, …). Its own chrome reuses the Table component's
# `--ui-table-*` tier so the wrapper border matches the cell borders and the
# empty-state matches muted table text. The pagination/toolbar meta text (outside
# the grid) uses the shared `text-muted-foreground`.
source: '@acronis-platform/tokens-pd'

tokens:
  - name: --ui-table-global-cell-border-color
    affects: table
    description: >-
      Wrapper border — matches the Table cell borders; also the column resize
      handle bar when enableColumnResizing is set.
  - name: --ui-table-global-row-color-idle
    affects: row
    description: >-
      Default row background. Transparent by design (an idle row shows the
      page/card surface through it) — pinned (sticky) idle cells use
      --ui-background-surface-primary instead, since an opaque background is
      required there so scrolled cells don't show through.
  - name: --ui-background-surface-primary
    affects: row
    description: >-
      Opaque background applied to pinned (sticky) header/body cells in the
      idle state (bridged to bg-background), since
      --ui-table-global-row-color-idle is transparent by design.
  - name: --ui-table-data-value-color-idle
    affects: expand-trigger
    description: Chevron color of the in-cell DataTableExpandTrigger.
  - name: --ui-table-data-value-color-disabled
    affects: empty-state
    description: Muted "No results." text — matches disabled table values.
  - name: --ui-text-on-surface-secondary
    affects: pagination
    description: Muted pagination / toolbar meta text (text-muted-foreground).
  - name: --ui-background-surface-secondary
    affects: row
    description: Striped row background + skeleton placeholder bars.
  - name: --ui-table-global-row-color-active
    affects: row
    description: Current (last-clicked) row highlight — the active-row color.
  - name: --ui-table-header-cell-color-hover
    affects: column-header
    description: >-
      Hover background of the single-click sort toggle; also the hover
      background of the in-cell expand trigger.
  - name: --ui-table-header-sort-icon-size
    affects: column-header
    description: Size of the sort-direction arrow in the column header.
  - name: --ui-table-header-sort-icon-color-active
    affects: column-header
    description: Active (sorted) arrow color — the brand blue, ascending or descending.
  - name: --ui-table-header-sort-icon-color-inactive
    affects: column-header
    description: Muted up/down arrow shown when the column is unsorted.
  - name: --ui-focus-primary
    affects: column-header
    description: >-
      Focus ring of the keyboard-focused sort toggle; also the in-cell expand
      trigger's focus ring.
