spec_version: '1.0'
component: DataTable
name: data-table
status: draft
category: data-display
description: >-
  A data grid built on TanStack react-table v8, composed over the Table
  primitives — sorting, filtering, column visibility, row selection, pagination,
  and optional row expansion. Ships with companion parts (column header,
  toolbar, pagination, view options). Ported from the legacy shadcn-uikit
  `data-table`.
since: 0.42.0
dependencies:
  components:
    - Table
    - Button
    - ButtonIcon
    - Checkbox
    - DropdownMenu
    - InputSelect
    - InputText
