spec_version: '1.0'
component: DataTable
name: data-table
status: draft
category: data-display
description: >-
  A data grid built on TanStack react-table v8, composed over the Table
  primitives — sorting, filtering (text + per-column), column visibility, row
  selection, pagination, optional row expansion (row-level or an in-cell expand
  trigger), column resizing, and sticky (pinned) columns. Ships with companion
  parts (column header, toolbar, pagination, view options, expand trigger).
  Ported from the legacy shadcn-uikit `data-table`.
since: 0.42.0
dependencies:
  components:
    - Table
    - Button
    - ButtonIcon
    - Checkbox
    - DropdownMenu
    - FilterSearch
    - InputSearch
    - Select
    - ChevronDownIcon
    - ChevronRightIcon
    - TimesIcon
