spec_version: '1.0'
component: DataTable
name: data-table
status: ready
category: data-display
description: >-
  A data grid built on TanStack react-table v8, composed over the Table
  primitives — sorting, filtering, column visibility, row selection, pagination,
  resizing, column width strategies, and optional row expansion. Exposes its
  TanStack `Table` instance via ref so companion parts (column header, toolbar,
  pagination, view options) can bind to the exact same grid. Ported from the
  legacy shadcn-uikit `data-table`.
since: 0.42.0
dependencies:
  components:
    - Table
    - Button
    - ButtonIcon
    - Checkbox
    - DropdownMenu
    - InputSelect
    - InputText
