spec_version: '1.0'
component: Button

schematic: |
  +---------------------------------+
  |  [icon]  label                  |   root: <button>
  +---------------------------------+
     ^         ^
     icon      label (children / text)
  variant -> colors    (single 32px-tall size)

root:
  element: button
  role: button
  description: >-
    Native button element — the interactive surface and the styled box
    (background, border, radius, height).

parts:
  - id: icon
    description: >-
      Leading or trailing icon. Any SVG child is sized to 16px via the
      `[&_svg]:size-4` rule and inherits the label color through currentColor.
      For the `ai` variant the consumer passes the icon explicitly (e.g.
      a Sparkles or AcronisAi icon) — it is not auto-injected.
    element: svg
    optional: true
    visible_when: an SVG child is present
  - id: label
    description: Text content passed as children.
    optional: true

layout:
  type: flex
  direction: row
  align: center
  order: [icon, label]

# Button is a pure function of its props — it owns no internal state, so there
# is no `internal_state`. Every state below is reached by a prop or a CSS
# pseudo-class.
states:
  - {
      id: default,
      trigger: "variant === 'default'",
      kind: prop,
      prop: variant,
      affects: [root],
    }
  - {
      id: secondary,
      trigger: "variant === 'secondary'",
      kind: prop,
      prop: variant,
      affects: [root],
    }
  - {
      id: ghost,
      trigger: "variant === 'ghost'",
      kind: prop,
      prop: variant,
      affects: [root],
    }
  - {
      id: destructive,
      trigger: "variant === 'destructive'",
      kind: prop,
      prop: variant,
      affects: [root],
    }
  - {
      id: ai,
      trigger: "variant === 'ai'",
      kind: prop,
      prop: variant,
      affects: [root],
    }
  - {
      id: hover,
      trigger: pointer hover,
      kind: pseudo,
      pseudo: ':hover',
      affects: [root],
    }
  - {
      id: active,
      trigger: pointer or keyboard activation,
      kind: pseudo,
      pseudo: ':active',
      affects: [root],
    }
  - {
      id: focus-visible,
      trigger: keyboard focus,
      kind: pseudo,
      pseudo: ':focus-visible',
      affects: [root],
    }
  - {
      id: disabled,
      trigger: 'disabled === true',
      kind: prop,
      prop: disabled,
      affects: [root, label],
    }
