spec_version: '1.0'
component: FunnelChart

# References only. Values live in @acronis-platform/tokens-pd. FunnelChart has no
# token tier of its own — stage colors are supplied by the caller via `config`
# (a dedicated `--ui-chart-*` data-viz palette is pending an upstream design
# pass). The tooltip chrome is inherited from the shared Chart primitives; the
# on-chart labels use the foreground text token.
source: '@acronis-platform/tokens-pd'

tokens:
  - name: --ui-text-on-surface-primary
    affects: labels
    description: On-chart stage labels (fill-foreground) and tooltip value text (text-foreground).
  - name: --ui-background-surface-primary
    affects: tooltip-content
    description: Tooltip surface (bg-background).
  - name: --ui-text-on-surface-secondary
    affects: tooltip-content
    description: Muted tooltip label text (text-muted-foreground).
  - name: --ui-border-on-surface-border
    affects: tooltip-content
    description: Tooltip border (border-border).
