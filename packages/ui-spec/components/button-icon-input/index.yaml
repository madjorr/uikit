component: ButtonIconInput
name: button-icon-input
status: ready
category: actions
description: >-
  A smaller icon-only button (20×20, 16px glyph) meant to live inside an
  input's box (e.g. a clear or reveal affordance), as opposed to `ButtonIcon`'s
  standalone 32×32 sizing. `variant` (`normal` / `error`) mirrors the tone of
  the field it sits in.
