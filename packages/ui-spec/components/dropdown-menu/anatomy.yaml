spec_version: '1.0'
component: DropdownMenu

schematic: |
  trigger: <ButtonMenu> (opens the menu)

  ─ when open ─────────────────────────────────────
  root: <div role="menu"> (popup)
  +-----------------------------------------------+
  | group (section, firstSection=true)            |
  |   item: Profile            shortcut ⇧⌘P      |
  |   item: Settings                    shortcut  |
  | ────── border-top (section separator) ──────  |
  | group (section, firstSection=false)           |
  |   submenu-trigger: Share               ›      |
  |     └ submenu-content: <div role=menu>        |
  |   item: Log out                               |
  +-----------------------------------------------+
     popup -> --ui-button-menu-dropdown-container-*
     item highlight -> --ui-button-menu-dropdown-item-container-color-hover
     item active    -> --ui-button-menu-dropdown-item-container-color-active
     focus ring     -> --ui-focus-primary (3px inset, keyboard-only)

root:
  element: div
  role: menu
  description: >-
    The portaled, positioned menu popup (Base UI `Menu.Popup`). A bordered,
    rounded surface themed by `--ui-button-menu-dropdown-container-*` tokens;
    receives focus and roving keyboard navigation when open.

parts:
  - id: trigger
    description: >-
      The control that opens the menu (Base UI `Menu.Trigger`). Typically
      composed with a `ButtonMenu` via the `render` prop.
    element: button
  - id: group
    description: >-
      A section of items (Figma `Section`). Non-first sections render a
      top border separator via `--ui-button-menu-dropdown-section-container-border-*`.
    element: div
    optional: true
  - id: item
    description: >-
      An action row (`role="menuitem"`). Highlighted via `data-[highlighted]`
      (pointer or keyboard); `inset` aligns it with items that have an indicator.
      Focus ring is visible only on keyboard navigation (focus-visible:not(:hover)).
    element: div
  - id: shortcut
    description: >-
      Right-aligned keyboard-shortcut hint inside an item
      (Figma `ItemExtras` variant=shortcut), muted color.
    element: span
    optional: true
  - id: submenu-trigger
    description: >-
      An item that opens a nested submenu (trailing chevron, Figma `ItemExtras`
      variant=cascade); highlighted on `data-[highlighted]` and filled on
      `data-[popup-open]`.
    element: div
    optional: true
  - id: submenu-content
    description: The nested submenu popup, same surface as the root.
    element: div
    optional: true

layout:
  type: flex
  direction: column
  order: [group, item]

# DropdownMenu owns one piece of internal state — whether it is open. The popup's
# presence is `internal` (driven by this state), reached via the controlled prop
# or interaction (see transitions).
internal_state:
  - id: open
    type: boolean
    values: [false, true]
    initial: false
    controllable_via: [open]
    controlled_default: default-open
    emits: open-change
    changed_by: >-
      trigger click / Enter / Space / Arrow opens; selecting an item, Esc, or
      outside-press closes (when uncontrolled)
    description: Whether the menu popup is shown.

transitions:
  - id: open
    state: open
    from: false
    on: trigger activation
    to: true
    effect: emits open-change(true)
    when_controlled: >-
      internal value does NOT change; the component emits open-change and the
      consumer must update the `open` prop.
  - id: close
    state: open
    from: true
    on: item select / Esc / outside press
    to: false
    effect: emits open-change(false)
    when_controlled: >-
      internal value does NOT change; the component emits open-change and the
      consumer must update the `open` prop.

states:
  - {
      id: open,
      trigger: 'internal open === true (data-[open])',
      kind: internal,
      affects: [root],
    }
  - {
      id: closed,
      trigger: 'internal open === false (data-[closed])',
      kind: internal,
      affects: [root],
    }
