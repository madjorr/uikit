spec_version: '1.0'
component: ChartState
name: chart-state
status: draft
category: data-display
description: >-
  A shared loading / empty / error placeholder for the chart types, rendered in
  place of the chart inside the same sized slot. A compact status block — a
  leading glyph (spinner / inbox / warning) over a centered label, with an
  optional retry action for the error state. Ported from the Figma InputSelect
  dropdown states; kept visually in step with the shipped `InputSelectStatus`.
  Design-pending v1 (no `--ui-chart-*` tier yet).
since: 0.58.0
