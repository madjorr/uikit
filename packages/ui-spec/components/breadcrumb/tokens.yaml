spec_version: '1.0'
component: Breadcrumb

# References only. Values live in @acronis-platform/tokens-pd (generated from
# @acronis-platform/design-tokens) and resolve per brand/theme at paint time.
# The token schema forbids a value/default key here — never restate values.
source: '@acronis-platform/tokens-pd'

tokens:
  - {
      name: --ui-breadcrumb-link-label-color-idle,
      affects: link,
      description: Link text color — idle,
    }
  - {
      name: --ui-breadcrumb-link-label-color-hover,
      affects: link,
      description: Link text color — hover,
    }
  - {
      name: --ui-breadcrumb-link-label-color-active,
      affects: link,
      description: Link text color — active / pressed,
    }
  - {
      name: --ui-breadcrumb-page-label-color,
      affects: page,
      description: Current-page text color,
    }
  - {
      name: --ui-breadcrumb-separator-icon-color,
      affects: separator,
      description: Chevron / separator icon color,
    }
  - {
      name: --ui-breadcrumb-separator-icon-size,
      affects: separator,
      description: Chevron / separator icon size (16px),
    }
  - {
      name: --ui-breadcrumb-list-gap,
      affects: list,
      description: Gap between items and separators (4px),
    }
  - {
      name: --ui-focus-primary,
      affects: link,
      description: Focus-visible ring color (3px flush to label),
    }
