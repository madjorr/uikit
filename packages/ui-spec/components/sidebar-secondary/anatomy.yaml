spec_version: '1.0'
component: SidebarSecondary

schematic: |
  root: <nav aria-label="…" data-state="expanded|collapsed">
  +-------------------------------------------------+
  | header: <div><h2>  (section title)              |
  +-------------------------------------------------+
  | EXPANDED                                        |
  | content: <div>  (scrollable)                    |
  |  +-------------------------------------------+  |
  |  | section: <div>                            |  |
  |  |  section-label: <div>                     |  |
  |  |  +-------------------------------------+  |  |
  |  |  | menu: <ul>                          |  |  |
  |  |  |  menu-item: <li><a> [icon] label    |  |  |
  |  |  |             [extras]                |  |  |
  |  |  |  menu-sub: Collapsible.Root <li>    |  |  |
  |  |  |   menu-sub-trigger: button + chevron|  |  |
  |  |  |   menu-sub-content: Collapsible.Panel|  |
  |  |  |     menu-sub-item: <li><a> (indented)|  |
  |  |  +-------------------------------------+  |  |
  |  +-------------------------------------------+  |
  |                                                 |
  | COLLAPSED                                       |
  | collapsed-breadcrumb: <div>                     |
  |   parent → separator → current page             |
  +-------------------------------------------------+
  | footer: <div>  (top border)                     |
  |  menu-item / collapse-trigger: <li><button>     |
  +-------------------------------------------------+
     menu-item selected   -> --ui-sidebar-secondary-menu-item-selected-container-*
     menu-item unselected -> --ui-sidebar-secondary-menu-item-unselected-container-*
     icon/label (both variants) -> --ui-sidebar-secondary-menu-item-global-*
     extras               -> --ui-sidebar-secondary-menu-item-extras-*

root:
  element: nav
  role: navigation
  description: >-
    Navigation landmark (`<nav>`) owning the expanded / collapsed width state via
    `data-state`, plus a right border. Polymorphic via the `render` prop.

parts:
  - id: header
    description: >-
      Title row (`<div>` + `<h2>`, 24/32 heading). Padding switches on
      expanded/collapsed.
    element: div
  - id: content
    description: >-
      Scrollable section list (`<div>`). Shown only when expanded; the
      collapsed-breadcrumb sibling replaces it when collapsed.
    element: div
  - id: collapsed-breadcrumb
    description: >-
      The rail-mode location indicator (`<div>`): parent label → separator icon
      (ChevronRight) → current page. Shown only when collapsed.
    element: div
  - id: footer
    description: Footer menu region (`<div>`) with a top divider.
    element: div
  - id: section
    description: >-
      A group of menu items (`<div>`). With `expandable`, it becomes a Base UI
      Collapsible: the section-label toggles the menu's visibility (Figma Section
      `expandable` variant).
    element: div
  - id: section-label
    description: >-
      Optional section caption (`<div>`) rendered above the menu. In an expandable
      section it is the collapsible trigger — a leading chevron + label, with an
      optional trailing `actions` slot and an `unreadRollup` badge shown while
      collapsed.
    element: div
    optional: true
  - id: menu
    description: The list (`<ul>`) that owns the inter-item gap.
    element: ul
  - id: menu-item
    description: >-
      A Level-1 leaf row (`<li><a>`, polymorphic via `render`): optional icon +
      label + optional extras. `selected` marks the current route and sets
      `aria-current="page"`. Only the container recolors per variant.
    element: a
  - id: menu-sub
    description: >-
      An expandable Level-1 row wrapping Base UI `Collapsible.Root` (`<li>`). Owns
      the per-row open state (`open`/`defaultOpen`/`onOpenChange`).
    element: li
  - id: menu-sub-trigger
    description: >-
      The disclosure parent row (`Collapsible.Trigger` → `<button>`). Styled like
      a Level-1 row with a trailing chevron that rotates on open.
    element: button
  - id: menu-sub-content
    description: >-
      The Level-2 child list container (`Collapsible.Panel` → `<div>` wrapping a
      `<ul>`). Shown when the row is open.
    element: div
  - id: menu-sub-item
    description: >-
      A Level-2 indented leaf (`<li><a>`); same container cva as Level-1 minus
      the icon, plus a left indent.
    element: a
  - id: extras
    description: >-
      Trailing affordance (`<span>`) inside a menu item: a shortcut, an
      external-link icon, a tag, or a tag + external-link.
    element: span
    optional: true
  - id: collapse-trigger
    description: >-
      The footer "Collapse menu" affordance (`<li><button>`): a row-styled button
      that toggles the panel width via the layout context, driving the
      controlled/uncontrolled `expanded` state and emitting `expanded-change`.
      Carries `aria-expanded`.
    element: button
    optional: true

layout:
  type: flex
  direction: column
  align: stretch
  order: [header, content, collapsed-breadcrumb, footer]

# `selected`, `expanded`, and the disclosure `open` are real props; the
# interaction states are pure CSS pseudo-classes on the rows.
states:
  - id: selected
    trigger: the row represents the current route
    kind: prop
    prop: selected
    affects: [menu-item, menu-sub-trigger, menu-sub-item]
  - id: expanded
    trigger: the panel is in full-width (expanded) mode
    kind: prop
    prop: expanded
    affects:
      [
        root,
        header,
        content,
        collapsed-breadcrumb,
        menu-item,
        extras,
        collapse-trigger,
      ]
  - id: open
    trigger: the expandable row's disclosure is open
    kind: prop
    prop: open
    affects: [menu-sub, menu-sub-trigger, menu-sub-content]
  - id: hover
    trigger: pointer hover over a row
    kind: pseudo
    pseudo: ':hover'
    affects: [menu-item, menu-sub-trigger, menu-sub-item]
  - id: active
    trigger: pointer or keyboard activation of a row
    kind: pseudo
    pseudo: ':active'
    affects: [menu-item, menu-sub-trigger, menu-sub-item]
  - id: focus-visible
    trigger: keyboard focus on a row
    kind: pseudo
    pseudo: ':focus-visible'
    affects: [menu-item, menu-sub-trigger, menu-sub-item]
