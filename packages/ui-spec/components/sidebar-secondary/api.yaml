spec_version: '1.0'
component: SidebarSecondary

# Framework-agnostic contract for a *composable* contextual navigation panel:
# assembled from parts (see anatomy.yaml). Property names are neutral; see
# `adapters` for per-framework syntax. Native element attributes pass through on
# the relevant part.
contract:
  properties:
    - name: render
      type: 'RenderProp'
      required: false
      default: undefined
      description: >-
        Base UI composition prop on the root and on the menu-item / sub-item
        parts — replaces the rendered element with another component (e.g. a
        router `Link`, or an `<aside>` wrapper on the root) while merging props
        and classes. React-only.
    - name: expanded
      type: boolean
      required: false
      default: undefined
      description: >-
        Controlled panel width state (on the root). `true` = full width (256px),
        `false` = collapsed rail (48px). Drives `data-state`.
    - name: defaultExpanded
      type: boolean
      required: false
      default: true
      description: Uncontrolled initial expanded state (on the root).
    - name: label
      type: ReactNode
      required: false
      default: undefined
      description: Heading text for the header part (or pass as children).
    - name: selected
      type: boolean
      required: false
      default: false
      description: >-
        Marks a menu-item / sub-trigger / sub-item as the current route — applies
        the `selected` container variant and sets `aria-current="page"`.
    - name: icon
      type: ReactNode
      required: false
      default: undefined
      description: Optional leading 16px icon for a Level-1 menu-item / sub-trigger.
    - name: href
      type: string
      required: false
      default: undefined
      description: Target URL of a menu-item / sub-item link.
    - name: open
      type: boolean
      required: false
      default: undefined
      description: >-
        Controlled disclosure state of an expandable row (menu-sub) or an
        expandable section. Driven by Base UI Collapsible; sets `aria-expanded` /
        `aria-controls`.
    - name: defaultOpen
      type: boolean
      required: false
      default: false
      description: >-
        Uncontrolled initial disclosure state of an expandable row or expandable
        section. (Expandable sections default to open.)
    - name: expandable
      type: boolean
      required: false
      default: false
      description: >-
        Makes a section a collapsible disclosure (section part): the section-label
        becomes a chevron toggle and the menu becomes its collapsible panel. Mirrors
        the Figma Section `expandable` variant.
    - name: actions
      type: ReactNode
      required: false
      default: undefined
      description: >-
        Trailing header actions on the section-label (e.g. a ghost ButtonIcon),
        rendered outside the toggle so they stay independently operable.
    - name: unreadRollup
      type: ReactNode
      required: false
      default: undefined
      description: >-
        A rollup badge (e.g. a Tag with an unread count) shown in an expandable
        section's header only while it is collapsed.
    - name: resizable
      type: boolean
      required: false
      default: true
      description: >-
        Enable the draggable resize edge on the right border. When `true`, the
        sidebar can be resized between the expanded-width token and twice that
        value.
    - name: resizeAriaLabel
      type: string
      required: false
      default: "'Resize sidebar'"
      description: >-
        Accessible label for the resize edge (`role="separator"`). Consumers
        should localize this string for i18n.
    - name: resizeTooltipExpanded
      type: ReactNode
      required: false
      default: '(English tooltip: Resize/Collapse/Reset)'
      description: >-
        Tooltip content shown when the sidebar is expanded. Pass `null` to hide
        the tooltip entirely. Consumers should localize for i18n.
    - name: resizeTooltipCollapsed
      type: ReactNode
      required: false
      default: '(English tooltip: Resize/Expand)'
      description: >-
        Tooltip content shown when the sidebar is collapsed. Pass `null` to hide
        the tooltip entirely. Consumers should localize for i18n.
    - name: expandTooltip
      type: ReactNode
      required: false
      default: "'Expand'"
      description: >-
        Tooltip text shown on the collapse trigger when the sidebar is collapsed.
        Consumers should localize this string for i18n.
    - name: extras-variant
      type: "'tag' | 'externalLink' | 'shortcut' | 'tag-externalLink'"
      required: true
      description: >-
        Which trailing affordance the extras part renders. React: the `variant`
        prop on `SidebarSecondaryMenuItemExtras`. (Named here without the bare
        `variant` key reserved for a root cva axis.)
    - name: shortcut
      type: string
      required: false
      default: undefined
      description: Keyboard-shortcut text for the extras `shortcut` variant.
    - name: tag
      type: ReactNode
      required: false
      default: undefined
      description: Tag content for the extras `tag` / `tag-externalLink` variants.

  events:
    - name: expanded-change
      payload: boolean
      description: >-
        Fires when the panel expanded state changes. React: `onExpandedChange`.
    - name: open-change
      payload: boolean
      description: >-
        Fires when an expandable row's disclosure opens/closes (Base UI
        Collapsible). React: `onOpenChange` on the menu-sub part.

  content:
    - name: default
      description: >-
        The composed panel. Author it from the parts: a header, a scrollable
        content region of sections (each with an optional label and a menu of
        fixed and expandable rows), and a footer. The collapsed-breadcrumb is
        rendered automatically by the root.

  methods: []

adapters:
  react:
    component: SidebarSecondary
    status: implemented
    import: >-
      import { SidebarSecondary, SidebarSecondaryHeader, SidebarSecondaryContent,
      SidebarSecondaryFooter, SidebarSecondarySection, SidebarSecondarySectionLabel,
      SidebarSecondaryMenu, SidebarSecondaryMenuItem, SidebarSecondaryMenuItemExtras,
      SidebarSecondaryCollapseTrigger } from '@acronis-platform/ui-react'
    example: |
      <SidebarSecondary expanded={expanded} onExpandedChange={setExpanded}>
        <SidebarSecondaryHeader label="Protection" />
        <SidebarSecondaryContent>
          <SidebarSecondarySection>
            <SidebarSecondarySectionLabel>Overview</SidebarSecondarySectionLabel>
            <SidebarSecondaryMenu>
              <SidebarSecondaryMenuItem render={<Link to="/dashboard" />} selected>
                Dashboard
              </SidebarSecondaryMenuItem>
              <SidebarSecondaryMenuItem render={<Link to="/policies" />}>
                Policies
              </SidebarSecondaryMenuItem>
            </SidebarSecondaryMenu>
          </SidebarSecondarySection>
        </SidebarSecondaryContent>
      </SidebarSecondary>

  vue:
    component: AvSidebarSecondary
    status: planned
    import: "import { AvSidebarSecondary, AvSidebarSecondaryMenuItem } from '@acronis-platform/ui-vue'"
    example: |
      <AvSidebarSecondary :expanded="expanded">
        <AvSidebarSecondaryMenuItem to="/dashboard" selected>Dashboard</AvSidebarSecondaryMenuItem>
      </AvSidebarSecondary>

  web-components:
    element: ui-sidebar-secondary
    status: planned
    import: "import '@acronis-platform/ui-wc/sidebar-secondary'"
    example: |
      <ui-sidebar-secondary expanded>
        <ui-sidebar-secondary-menu-item href="/dashboard" selected>Dashboard</ui-sidebar-secondary-menu-item>
      </ui-sidebar-secondary>
