spec_version: '1.0'
component: Dialog
name: dialog
status: draft
category: overlays
description: >-
  A higher-level "recipe" dialog built on top of the DialogRoot primitive
  parts. A single `variant` prop selects one of seven canned use-cases
  (default, rename, save changes, reset password, discard changes, accept,
  read-only) — each with its own title, body copy and footer buttons — plus a
  legacy `wide` escape hatch (no canned preset, free-form footer via the
  `footer` prop) kept for backward compatibility with pre-Figma call sites.
  `children` overrides the body slot and `hasLoading` shows a spinner overlay.
  Colors and typography resolve to shipped semantic tokens; container/header/
  footer geometry has no dedicated token tier yet (see tokens.yaml). In Figma
  the matching component set is named "DialogDefault"; the code-facing name is
  `Dialog`.
since: 0.58.0
figma:
  node: '6343-58898'
  codeConnect: packages/ui-react/src/components/ui/dialog/dialog.figma.tsx
dependencies:
  components:
    - DialogRoot
    - Button
    - InputText
    - Spinner
    - TimesIcon
