spec_version: '1.0'
component: Dialog

schematic: |
  ─ when open ─────────────────────────────────────────────────
  overlay: full-screen scrim (from DialogContent)
  +===========================================================+
  |  root/container: <div role="dialog"> (centered popup card) |
  |   +-----------------------------------------------------+ |
  |   | header (optional, hasHeader): title ....... close(×) | |
  |   +-----------------------------------------------------+ |
  |   | body:  variant copy / children slot                 | |
  |   +-----------------------------------------------------+ |
  |   | footer (optional, hasFooter): [secondary] [primary]  | |
  |   +-----------------------------------------------------+ |
  |   | loading-overlay (only when hasLoading): spinner     | |
  +===========================================================+
     container -> --ui-dialog-container-*, rounded, shadow
     header / footer -> --ui-dialog-header-* / --ui-footer-*
     title / body    -> text-foreground
     close-button    -> times icon, --ui-button-icon-global-icon-color-idle (constant across states) → hover/active bg
     loading-overlay -> surface-secondary @ 95% scrim over body + footer

root:
  element: div
  role: dialog
  description: >-
    The modal popup (Base UI `Dialog.Popup` via `DialogContent`), centered and
    portaled. Carries `role="dialog"`/`aria-modal`, is labelled by the title,
    traps focus, and locks scroll while open.

parts:
  - id: container
    description: >-
      The rounded surface card (the popup) that holds the header, body and
      footer. `--ui-dialog-container-color` fill with a shadow; min-width
      `--ui-dialog-container-width-min` (256px). `size` controls the max-width:
      `sm` (512px, the Figma default) or `large` (832px, a legacy backward-
      compatibility size with no design token).
    element: div
  - id: header
    description: >-
      Top bar holding the title and close button. `--ui-dialog-header-color`
      bar with a bottom divider. Hidden when `hasHeader` is `false` — the
      title still renders off-screen so the dialog keeps an accessible name.
      Beyond the strict Figma contract (always shown in all seven canned
      variants); a ui-react-only extension.
    element: div
    optional: true
  - id: title
    description: >-
      The dialog's accessible name (Base UI `Dialog.Title`), wired to
      `aria-labelledby`. Set per variant; freely overridable via `title`.
      `rename`/`accept` interpolate `objectName` into their canned title
      (e.g. "Rename {objectName}") when no `title` override is given. Always
      rendered — visibly inside `header`, or `sr-only` when `hasHeader` is
      `false` — so the dialog keeps an accessible name either way.
    element: h2
  - id: close-button
    description: >-
      Icon button (Base UI `Dialog.Close` + a times icon) that dismisses the
      dialog. Labelled "Close" for screen readers. Present in every variant
      when `hasHeader` is `true` (the default); omitted along with the rest of
      `header` when `hasHeader` is `false`.
    element: button
    optional: true
  - id: body
    description: >-
      Content region between the header and footer. Renders the variant's canned
      copy (or the `rename` text field) unless `children` is provided.
      `rename`/`discard changes` interpolate `objectName` into their canned
      body (the field's prefilled value, or the bolded object name) when no
      `children` override is given.
    element: div
  - id: footer
    description: >-
      Bottom action bar (right-aligned). `--ui-footer-default-color` bar with a
      top divider. Holds a secondary (dismiss) button and a primary/destructive
      action for the seven canned variants (`read-only` shows a single primary
      action); the `footer` prop replaces this with free-form content — the
      escape hatch the legacy `wide` variant is meant to be paired with. Hidden
      entirely when `hasFooter` is `false`. Beyond the strict Figma contract
      (always shown in all seven canned variants); a ui-react-only extension.
    element: div
    optional: true
  - id: loading-overlay
    description: >-
      Absolutely-positioned scrim covering the body + footer with a centered
      spinner, inset from just below the header to the bottom — or from the
      very top when `hasHeader` is `false`. Rendered only while `hasLoading`
      is set.
    element: div
    optional: true

layout:
  type: flex
  direction: column
  order: [header, body, footer]

internal_state:
  - id: open
    type: boolean
    values: [false, true]
    initial: false
    controllable_via: [open]
    controlled_default: default-open
    emits: open-change
    changed_by: >-
      controlled `open`/`default-open`; a Close part / Esc / outside-press closes
      when uncontrolled
    description: Whether the dialog is shown; reflected to the popup + overlay.

states:
  - id: variant
    trigger: >-
      variant selects the canned title / body / footer preset (`wide` has no
      preset — it's a free-form escape hatch paired with `size="large"` and
      the `footer` prop)
    kind: prop
    prop: variant
    affects: [title, body, footer]
  - id: loading
    trigger: hasLoading is set
    kind: prop
    prop: hasLoading
    affects: [loading-overlay]
  - id: header-hidden
    trigger: hasHeader is false
    kind: prop
    prop: hasHeader
    affects: [header, close-button, loading-overlay]
  - id: footer-hidden
    trigger: hasFooter is false
    kind: prop
    prop: hasFooter
    affects: [footer]
  - {
      id: open,
      trigger: 'internal open === true (data-[open])',
      kind: internal,
      affects: [root, container],
    }
  - {
      id: closed,
      trigger: 'internal open === false (data-[closed])',
      kind: internal,
      affects: [root, container],
    }
  - {
      id: focus-visible,
      trigger: keyboard focus on the close button,
      kind: pseudo,
      pseudo: ':focus-visible',
      affects: [close-button],
    }
