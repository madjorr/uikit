spec_version: '1.0'
component: Dialog

# Framework-agnostic contract for the Dialog recipe. It composes the
# DialogRoot primitive parts, so the open-state / modality / portal props
# mirror DialogRoot; `variant`, `hasLoading`, `footer` and the body slot are
# the recipe-specific API.
contract:
  properties:
    - name: variant
      type: "'default' | 'rename' | 'save changes' | 'reset password' | 'discard changes' | 'accept' | 'read-only' | 'wide'"
      required: false
      default: "'default'"
      description: >-
        Selects the canned title, body copy and footer buttons. `discard changes`
        uses a destructive primary action; `read-only` shows a single primary
        action (no secondary button). `wide` has no canned preset — a legacy
        escape hatch kept for backward compatibility, meant to be paired with
        `size="large"` and the `footer` prop.
    - name: hasLoading
      type: boolean
      required: false
      default: false
      description: >-
        Shows a spinner overlay across the body + footer (inset from just below
        the header to the bottom).
    - name: title
      type: string
      required: false
      description: >-
        Overrides the variant's default title, for localization or copy
        changes.
    - name: secondaryLabel
      type: string
      required: false
      description: >-
        Overrides the variant's default secondary (dismiss) button label.
        Passing this on a variant with no secondary button by default (e.g.
        `read-only`) also makes the button appear. Ignored when `footer` is
        provided.
    - name: primaryLabel
      type: string
      required: false
      description: >-
        Overrides the variant's default primary button label. Ignored when
        `footer` is provided.
    - name: footer
      type: ReactNode
      required: false
      description: >-
        Replaces the footer's action content entirely with free-form buttons —
        the escape hatch the `wide` variant is meant to be paired with, for
        legacy call sites that don't fit one of the seven canned presets.
    - name: closeLabel
      type: string
      required: false
      default: "'Close'"
      description: Overrides the close button's accessible name.
    - name: open
      type: boolean
      required: false
      description: Controlled open state. Pair with the change event.
    - name: default-open
      type: boolean
      required: false
      default: false
      description: Initial open state when uncontrolled (React `defaultOpen`).
    - name: modal
      type: "boolean | 'trap-focus'"
      required: false
      default: true
      description: >-
        Modal behavior — traps focus and locks background scroll while open.
        `'trap-focus'` keeps the focus trap but allows background interaction.
    - name: size
      type: "'sm' | 'large'"
      required: false
      default: "'sm'"
      description: >-
        Popup max-width (forwarded to the underlying content). Defaults to `sm`
        (512px, the Figma-defined size), or to `large` (832px) when `variant`
        is `wide`. `large` predates the Figma node and has no design token —
        a legacy backward-compatibility size, not a design-system width scale.
    - name: portal
      type: boolean
      required: false
      default: true
      description: >-
        Render the content inside a portal (forwarded to the underlying content).
        Required for correct stacking; disable only when supplying your own
        portal ancestor.

  events:
    - name: open-change
      payload: boolean
      description: >-
        Fired when the dialog opens or closes (React: `onOpenChange`). Payload is
        the new open value.

  content:
    - name: default
      description: >-
        Body slot. When provided, it replaces the variant's canned body copy
        while keeping the header and footer chrome.

  methods: []

adapters:
  react:
    component: Dialog
    status: implemented
    import: "import { Dialog } from '@acronis-platform/ui-react'"
    example: |
      <Dialog variant="discard changes" open onOpenChange={setOpen} />

      {/* Override the body slot */}
      <Dialog variant="default" defaultOpen>
        <p>Any custom content.</p>
      </Dialog>

      {/* Legacy wide variant — free-form footer, kept for backward compatibility */}
      <Dialog variant="wide" size="large" title="Configure discovery agent" open
        footer={<>
          <DialogClose render={<Button variant="ghost">Cancel</Button>} />
          <Button>Configure</Button>
        </>}
      />

  vue:
    component: AvDialog
    status: planned
    import: "import { AvDialog } from '@acronis-platform/ui-vue'"
    example: |
      <AvDialog v-model:open="open" variant="save changes" />

  web-components:
    element: ui-dialog
    status: planned
    import: "import '@acronis-platform/ui-wc/dialog'"
    example: |
      <ui-dialog open variant="reset password"></ui-dialog>
