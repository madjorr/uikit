spec_version: '1.0'
component: Dialog

# Framework-agnostic contract for a *composable* modal dialog: the overlay is
# assembled from parts (see anatomy.yaml). The root owns the open state; the
# parts render the trigger, scrim, and popup furniture. Property names are
# neutral; see `adapters` for per-framework syntax.
contract:
  properties:
    - name: open
      type: boolean
      required: false
      description: Controlled open state. Pair with the change event.
    - name: default-open
      type: boolean
      required: false
      default: false
      description: Initial open state when uncontrolled.
    - name: modal
      type: "boolean | 'trap-focus'"
      required: false
      default: true
      description: >-
        Modal behavior — traps focus and locks background scroll while open.
        `'trap-focus'` keeps the focus trap but allows background interaction.
    - name: size
      type: "'xs' | 'sm' | 'md' | 'lg' | 'xl' | '2xl'"
      required: false
      default: "'sm'"
      description: >-
        Popup max-width (on the content part). xs 464 · sm 512 · md 672 · lg 832
        · xl 992 · 2xl 1136 (px). Mirrors the reference design's six widths.
    - name: portal
      type: boolean
      required: false
      default: true
      description: >-
        Render the content inside a portal (the content part). Required by the
        underlying primitive for correct stacking; disable only when supplying
        your own portal ancestor.
    - name: render
      type: 'RenderProp'
      required: false
      default: undefined
      description: >-
        Composition prop available on the trigger, close, title, description, and
        other primitive parts — replaces the rendered element with another
        component (e.g. render the trigger as a Button) while merging props.
        React-only; other frameworks use their own polymorphism.

  events:
    - name: open-change
      payload: boolean
      description: >-
        Fired when the dialog opens or closes (React: `onOpenChange`). Payload is
        the new open value.

  content:
    - name: default
      description: >-
        The composed dialog. Author it from the parts: an optional trigger, plus
        the content (popup) wrapping an optional header (title + close), a body
        (with a description), and an optional footer for actions.

  methods: []

adapters:
  react:
    component: Dialog
    status: implemented
    import: >-
      import { Dialog, DialogTrigger, DialogContent, DialogHeader, DialogTitle,
      DialogCloseButton, DialogBody, DialogDescription, DialogFooter } from
      '@acronis-platform/ui-react'
    example: |
      <Dialog>
        <DialogTrigger render={<Button variant="secondary">Open</Button>} />
        <DialogContent>
          <DialogHeader>
            <DialogTitle>Are you absolutely sure?</DialogTitle>
            <DialogCloseButton />
          </DialogHeader>
          <DialogBody>
            <DialogDescription>This action cannot be undone.</DialogDescription>
          </DialogBody>
          <DialogFooter>
            <DialogClose render={<Button variant="ghost">Cancel</Button>} />
            <Button variant="destructive">Delete</Button>
          </DialogFooter>
        </DialogContent>
      </Dialog>

  vue:
    component: AvDialog
    status: planned
    import: "import { AvDialog, AvDialogContent } from '@acronis-platform/ui-vue'"
    example: |
      <AvDialog v-model:open="open">
        <AvDialogContent>
          <AvDialogTitle>Are you sure?</AvDialogTitle>
        </AvDialogContent>
      </AvDialog>

  web-components:
    element: ui-dialog
    status: planned
    import: "import '@acronis-platform/ui-wc/dialog'"
    example: |
      <ui-dialog open>
        <ui-dialog-content>
          <ui-dialog-title>Are you sure?</ui-dialog-title>
        </ui-dialog-content>
      </ui-dialog>
