spec_version: '1.0'
component: Dialog

# References only. Values live in @acronis-platform/tokens-pd (generated from
# @acronis-platform/design-tokens) and resolve per brand/theme at paint time.
# This is a design-pending v1: no `--ui-dialog-*` component tier exists yet, so
# the dialog consumes the shared *semantic* tokens (via the bridged Tailwind
# names bg-muted / bg-background / text-foreground / text-muted-foreground /
# border-border, plus direct var() refs for the overlay and focus ring). Replace
# these with a `--ui-dialog-*` tier if/when a Figma pass introduces one.
source: '@acronis-platform/tokens-pd'

tokens:
  - {
      name: --ui-background-overlay-primary,
      affects: overlay,
      description: Scrim color behind the popup (direct var ref),
    }
  - {
      name: --ui-background-surface-secondary,
      affects: root,
      description: Popup body surface (bridged as `bg-muted`),
    }
  - {
      name: --ui-background-surface-primary,
      affects: header,
      description: Header / footer bar surface (bridged as `bg-background`),
    }
  - {
      name: --ui-text-on-surface-primary,
      affects: title,
      description: Title / default text color (bridged as `text-foreground`),
    }
  - {
      name: --ui-text-on-surface-secondary,
      affects: description,
      description: 'Description + idle close-icon color (bridged as text-muted-foreground)',
    }
  - {
      name: --ui-border-on-surface-border,
      affects: header,
      description: Header bottom / footer top divider (bridged as `border-border`),
    }
  - {
      name: --ui-focus-primary,
      affects: close,
      description: Focus-visible ring on the close button,
    }
