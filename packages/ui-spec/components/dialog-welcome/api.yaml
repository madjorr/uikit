spec_version: '1.0'
component: DialogWelcome

# Framework-agnostic contract for the DialogWelcome recipe. It composes the
# Dialog primitive parts, so the open-state / modality / portal props mirror
# Dialog; `title`, `description` and the image/body slots are the recipe-specific
# API. The footer carousel is intentionally out of scope (separate
# Carousel / CarouselDialogFooter component set).
contract:
  properties:
    - name: title
      type: string
      required: true
      description: >-
        Step title. Rendered as the dialog's accessible name (unless the body is
        overridden via the default content slot).
    - name: description
      type: string
      required: true
      description: Supporting copy shown below the title.
    - name: open
      type: boolean
      required: false
      description: Controlled open state. Pair with the change event.
    - name: default-open
      type: boolean
      required: false
      default: false
      description: Initial open state when uncontrolled (React `defaultOpen`).
    - name: modal
      type: "boolean | 'trap-focus'"
      required: false
      default: true
      description: >-
        Modal behavior — traps focus and locks background scroll while open.
        `'trap-focus'` keeps the focus trap but allows background interaction.
    - name: size
      type: "'xs' | 'sm' | 'md' | 'lg' | 'xl' | '2xl'"
      required: false
      default: "'sm'"
      description: >-
        Popup max-width (forwarded to the underlying content). Defaults to `sm`
        (512px), matching the reference design.
    - name: portal
      type: boolean
      required: false
      default: true
      description: >-
        Render the content inside a portal (forwarded to the underlying content).
        Required for correct stacking; disable only when supplying your own
        portal ancestor.

  events:
    - name: open-change
      payload: boolean
      description: >-
        Fired when the dialog opens or closes (React: `onOpenChange`). Payload is
        the new open value.

  content:
    - name: image
      description: >-
        Illustration / media slot rendered above the text (React: the `image`
        prop). Empty when omitted.
    - name: default
      description: >-
        Body slot. When provided, it replaces the title + description text block
        below the image (the consumer must then supply an accessible name).

  methods: []

adapters:
  react:
    component: DialogWelcome
    status: implemented
    import: "import { DialogWelcome } from '@acronis-platform/ui-react'"
    example: |
      <DialogWelcome
        title="Welcome"
        description="Take a quick tour."
        image={<img src={src} alt="" />}
        open={open}
        onOpenChange={setOpen}
      />

  vue:
    component: AvDialogWelcome
    status: planned
    import: "import { AvDialogWelcome } from '@acronis-platform/ui-vue'"
    example: |
      <AvDialogWelcome v-model:open="open" title="Welcome" description="…" />

  web-components:
    element: ui-dialog-welcome
    status: planned
    import: "import '@acronis-platform/ui-wc/dialog-welcome'"
    example: |
      <ui-dialog-welcome open title="Welcome"></ui-dialog-welcome>
