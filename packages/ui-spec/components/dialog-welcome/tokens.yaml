spec_version: '1.0'
component: DialogWelcome

# References only. Values live in @acronis-platform/tokens-pd (generated from
# @acronis-platform/design-tokens) and resolve per brand/theme at paint time.
#
# Container geometry/color comes from the shared DialogContent (dialog.tsx),
# themed by the `--ui-dialog-container-*` tokens — reconciled against the
# DialogWelcome Figma node (6353:6164). The body's gap/padding/image-height
# reference generic spacing primitives in Figma, not a `--ui-dialog-body-*`
# component token, so they stay plain Tailwind utilities in the ui-react source.
#
# The footer carousel (and its --ui-background-surface-active / ButtonIcon dot
# tokens) is out of scope here — see the separate Carousel / CarouselDialogFooter
# component set (tracked in PR #574).
source: '@acronis-platform/tokens-pd'

tokens:
  - {
      name: --ui-background-backdrop-screen,
      affects: root,
      description: Scrim color behind the popup (via DialogContent overlay),
    }
  - {
      name: --ui-dialog-container-color,
      affects: container,
      description: Popup container surface,
    }
  - {
      name: --ui-dialog-container-border-radius,
      affects: container,
      description: Popup container corner radius,
    }
  - {
      name: --ui-dialog-container-width-min,
      affects: container,
      description: Popup container minimum width,
    }
  - {
      name: --ui-background-surface-secondary,
      affects: image,
      description: 'Empty image-slot fallback (bridged `bg-muted`)',
    }
  - {
      name: --ui-text-on-surface-primary,
      affects: title,
      description: Title + description text color (bridged as `text-foreground`),
    }
