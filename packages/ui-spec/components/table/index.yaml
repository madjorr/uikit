spec_version: '1.0'
component: Table
name: table
status: draft
category: data-display
description: >-
  Displays rows and columns of data. A set of composable parts (header, body,
  footer, row, column header, cell, caption) with sortable column headers, a
  selected row state, and wrappable cells, plus two TanStack-independent
  companions — a pagination bar (TablePagination) and a show/hide-columns menu
  (TableViewOptions) — and two headless hooks (useSortState, useTableUrlState).
  Ported from the legacy shadcn-uikit `Table` and informed by the pre-release
  Table design; themed by the `--ui-table-*` token tier. The TanStack-backed data
  grid (`DataTable`) composes these primitives.
since: 0.10.0
dependencies:
  components:
    - ArrowsDownUpIcon
    - ArrowUpIcon
    - ArrowDownIcon
    - ChevronFirstIcon
    - ChevronLastIcon
    - ChevronLeftIcon
    - ChevronRightIcon
    - CogIcon
    - Button
    - ButtonIcon
    - Select
    - DropdownMenu
