spec_version: '1.0'
component: Table

schematic: |
  view-options:  [ ⚙ View ▾ ]   (show/hide columns dropdown, optional)
  root: <table> (in a horizontally scrollable container)
  +-----------------------------------------------------------------+
  | header: <thead>                                                 |
  |   row: <tr>                                                     |
  |     head: <th> Name ⇅   | head: <th> Status | head ▸ sortable  |
  +-----------------------------------------------------------------+
  | body: <tbody>                                                   |
  |   row: <tr> (idle / hover / selected)                           |
  |     cell: <td> John Smith | cell: <td> Active | cell ▸ wrap     |
  +-----------------------------------------------------------------+
  | footer: <tfoot>                                                 |
  |   row > cell: Total ............................. $750.00       |
  +-----------------------------------------------------------------+
  caption: <caption> (optional, below the table)
  pagination:  "N of M selected"  [Rows per page ▾]  Page X of Y  ⏮ ◀ ▶ ⏭
     head    -> --ui-table-header-label-color, hover --ui-table-header-cell-color-hover
     sortable head -> sort icon (--ui-table-header-sort-icon-color-*) + aria-sort
     row     -> idle/hover/active (selected) via --ui-table-global-row-color-*
     cell    -> --ui-table-global-cell-{padding-x,padding-y,border-color}; wrap grows height

root:
  element: table
  role: table
  description: >-
    The `<table>` (wrapped in a `overflow-auto` container for horizontal scroll).
    Text color comes from `--ui-table-data-value-color-idle`.

parts:
  - id: header
    description: Column-header section (`<thead>`).
    element: thead
    optional: true
  - id: body
    description: The data rows section (`<tbody>`).
    element: tbody
    optional: true
  - id: footer
    description: Summary section (`<tfoot>`) with a top divider.
    element: tfoot
    optional: true
  - id: row
    description: >-
      A table row (`<tr>`). Idle/hover come from `--ui-table-global-row-color-*`;
      `selected` applies the active token + `data-state="selected"`.
    element: tr
  - id: head
    description: >-
      A column header cell (`<th>`). When `sortable`, it renders a focusable sort
      button with a sort icon and sets `aria-sort`. `wrap` lets the label wrap onto
      multiple lines and drops the fixed row height (otherwise `h-10`).
    element: th
  - id: cell
    description: >-
      A data cell (`<td>`) — padding/border from the cell tokens. Truncates within
      the fixed row height (`h-10`) by default; `wrap` switches it to
      `whitespace-normal` and lets the row grow to fit multi-line content.
    element: td
  - id: caption
    description: Optional table caption (`<caption>`), muted, below the table.
    element: caption
    optional: true
  - id: pagination
    description: >-
      TablePagination — a TanStack-independent pagination bar driven by plain
      props: an optional selection/row summary, a rows-per-page select, a page
      indicator, and first / prev / next / last controls.
    element: div
    optional: true
  - id: view-options
    description: >-
      TableViewOptions — a TanStack-independent show/hide-columns dropdown driven
      by a plain `{ id, label, hidden }[]` + `onToggle` (a checkbox per column).
    element: div
    optional: true

layout:
  type: table
  order: [header, body, footer]

states:
  - {
      id: selected,
      trigger: 'selected === true on a row',
      kind: prop,
      prop: selected,
      affects: [row],
    }
  - {
      id: sorted,
      trigger: "sort-direction is 'asc' or 'desc' on a sortable head",
      kind: prop,
      prop: sort-direction,
      affects: [head],
    }
  - {
      id: wrap,
      trigger: 'wrap === true on a cell or head',
      kind: prop,
      prop: wrap,
      affects: [cell, head],
    }
  - {
      id: header-hover,
      trigger: pointer hover over a sortable header,
      kind: pseudo,
      pseudo: ':hover',
      affects: [head],
    }
  - {
      id: header-focus,
      trigger: keyboard focus on a sortable header,
      kind: pseudo,
      pseudo: ':focus-visible',
      affects: [head],
    }
