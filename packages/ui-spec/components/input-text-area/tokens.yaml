spec_version: '1.0'
component: InputTextArea

# References only. Values live in @acronis-platform/tokens-pd (generated from
# @acronis-platform/design-tokens) and resolve per brand/theme at paint time.
# InputTextArea uses the dedicated `--ui-input-text-area-*` tier plus two
# semantic focus-ring tokens. NOTE: this tier has NO error-specific border/fill
# token — the error state (aria-invalid) reuses the `--ui-focus-error` ring only.
