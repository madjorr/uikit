spec_version: '1.0'
component: Checkbox

# References only. Values live in @acronis-platform/tokens-pd (generated from
# @acronis-platform/design-tokens) and resolve per brand/theme at paint time.
# Checkbox uses its dedicated `--ui-checkbox-*` tier: three box state-groups
# (unchecked / checked / indeterminate), each with per-interaction fill, border,
# and glyph colors, plus global geometry and the label/description text.
source: '@acronis-platform/tokens-pd'

