spec_version: '1.0'
component: Link

# References only — values live in @acronis-platform/tokens-pd. The `--ui-link-*`
# tier wires text color, text decoration, and the external-icon color per state; the
# focus ring uses the shared `--ui-focus-primary` token.
source: '@acronis-platform/tokens-pd'

tokens:
  # ── Layout ──
  - { name: --ui-link-global-container-gap, affects: root }

  # ── Text color ──
  - { name: --ui-link-normal-text-color-idle, affects: label }
  - { name: --ui-link-normal-text-color-hover, affects: label }
  - { name: --ui-link-normal-text-color-active, affects: label }
  - { name: --ui-link-normal-text-color-disabled, affects: label }

  # ── Text decoration (underline on hover) ──
  - { name: --ui-link-global-text-decoration-idle, affects: label }
  - { name: --ui-link-global-text-decoration-hover, affects: label }
  - { name: --ui-link-global-text-decoration-active, affects: label }
  - { name: --ui-link-global-text-decoration-disabled, affects: label }

  # ── External icon color ──
  - { name: --ui-link-normal-external-icon-color-idle, affects: icon }
  - { name: --ui-link-normal-external-icon-color-hover, affects: icon }
  - { name: --ui-link-normal-external-icon-color-active, affects: icon }
  - { name: --ui-link-normal-external-icon-color-disabled, affects: icon }

  # ── Focus ring ──
  - { name: --ui-focus-primary, affects: root, description: Focus ring }
