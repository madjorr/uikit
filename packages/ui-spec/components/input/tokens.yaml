spec_version: '1.0'
component: Input

# References only. Values live in @acronis-platform/tokens-pd (generated from
# @acronis-platform/design-tokens) and resolve per brand/theme at paint time.
# Input uses the dedicated `--ui-input-text-*` tier plus two semantic focus-ring
# tokens.
source: '@acronis-platform/tokens-pd'

tokens:
  - {
      name: --ui-input-text-global-box-height,
      affects: root,
      description: Field height,
    }
  - {
      name: --ui-input-text-global-box-border-radius,
      affects: root,
      description: Field corner radius,
    }
  - {
      name: --ui-input-text-global-box-padding-x,
      affects: root,
      description: Horizontal padding,
    }
  - {
      name: --ui-input-text-global-box-color-idle,
      affects: root,
      description: Field fill (idle / focus / error),
    }
  - {
      name: --ui-input-text-global-box-color-hover,
      affects: root,
      description: Field fill on hover,
    }
  - { name: --ui-input-text-global-box-color-disabled, affects: root }
  - {
      name: --ui-input-text-normal-box-border-color-idle,
      affects: root,
      description: Border when idle / filled,
    }
  - {
      name: --ui-input-text-normal-box-border-color-hover,
      affects: root,
      description: Border on hover and focus,
    }
  - { name: --ui-input-text-normal-box-border-color-disabled, affects: root }
  - {
      name: --ui-input-text-error-msg-box-border-color-idle,
      affects: root,
      description: Border when invalid,
    }
  - {
      name: --ui-input-text-global-value-color-idle,
      affects: root,
      description: Entered value text color,
    }
  - { name: --ui-input-text-global-value-color-disabled, affects: root }
  - {
      name: --ui-input-text-global-placeholder-color-idle,
      affects: root,
      description: Placeholder text color,
    }
  - { name: --ui-input-text-global-placeholder-color-disabled, affects: root }
  - { name: --ui-focus-primary, affects: root, description: Focus ring color }
  - {
      name: --ui-focus-error,
      affects: root,
      description: Focus ring color when invalid,
    }
