packages:
  - 'apps/*'
  - 'packages/*'
  - 'packages/legacy/*'

# Single source of truth for dependency versions used by more than one
# workspace. Workspaces refer to these with "catalog:" — pnpm rewrites
# this to the concrete version when publishing.
catalog:
  # React + types
  react: 19.2.6
  react-dom: 19.2.6
  '@types/react': 19.2.15
  '@types/react-dom': 19.2.3
  '@types/node': 25.9.1

  # Toolchain
  typescript: 6.0.3
  eslint: 9.39.4
  # Held on the Rollup-based Vite 6 line. Vite 8 defaults to the rolldown
  # bundler (rolldown@1.x), which miscompiles es-toolkit's CommonJS compat
  # modules (pulled in transitively via recharts) when bundled into the
  # published UI library, producing a dist that builds but throws
  # "t is not a function" at runtime in SSR consumers (apps/docs prerender).
  # @vitejs/plugin-react is correspondingly held at 5.x (6.x requires
  # vite ^8). Revisit once rolldown's CJS interop is fixed.
  vite: 6.4.2
  vitest: 4.1.7

  # Cross-workspace runtime deps. Versions intentionally match
  # packages/legacy/ui (the published library) so its typecheck stays
  # stable; private apps adopt these versions to remove drift.
  react-hook-form: 7.76.1
  '@hookform/resolvers': 5.4.0
  '@tanstack/react-table': 8.21.3
  recharts: 3.8.1
  date-fns: 4.3.0
  sonner: 2.0.7
  next-themes: 0.4.6
  # NOTE: zod is intentionally NOT in the catalog yet — apps/demos still
  # uses 3.x while the UI lib + apps/demo are on 4.x. Aligning is a
  # separate follow-up because the 3→4 upgrade is a breaking change.

  # Tailwind v4 ecosystem
  tailwindcss: 4.3.0
  '@tailwindcss/postcss': 4.3.0
  tw-animate-css: 1.4.0

# Pin transitive deps that we don't want pnpm to bump.
overrides:
  prismjs: 1.30.0
  postcss: 8.5.10
